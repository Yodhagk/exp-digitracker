# DigiTracker - Apache Virtual Host Configuration
# Location: /etc/apache2/sites-available/digitracker.conf
# Includes: response time logging, structured log format, PHP error routing

# Custom log format: IP, method, URI, status, bytes, referer, UA, response_time_ms
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %Dms" digitracker_timed

<VirtualHost *:80>
    DocumentRoot /var/www/html/digitracker
    ServerName   digitracker.local

    <Directory /var/www/html/digitracker>
        Options       FollowSymLinks
        AllowOverride All
        Require       all granted
    </Directory>

    # ── Logs go to /var/app/logs/ ─────────────────────────
    ErrorLog  /var/app/logs/apache_error.log
    CustomLog /var/app/logs/apache_access.log digitracker_timed

    # ── PHP error routing ─────────────────────────────────
    php_admin_value error_log   /var/app/logs/php_errors.log
    php_admin_flag  log_errors  On
    php_admin_flag  display_errors Off

    # ── Security headers ──────────────────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

</VirtualHost>
