# DigiTracker - Log Rotation Configuration
# Location: /etc/logrotate.d/digitracker

# ── App service logs (startup, shutdown, health) ───────────
/var/app/logs/service.log {
    su root www-data
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 www-data www-data
    dateext
    dateformat -%Y%m%d
}

# ── PHP application action log ─────────────────────────────
/var/app/logs/app.log {
    su root www-data
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 www-data www-data
    dateext
    dateformat -%Y%m%d
}

# ── PHP error log ──────────────────────────────────────────
/var/app/logs/php_errors.log {
    su root www-data
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 640 www-data www-data
    dateext
    dateformat -%Y%m%d
}

# ── Apache access + error logs ─────────────────────────────
/var/app/logs/apache_access.log
/var/app/logs/apache_error.log {
    su root www-data
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 640 www-data www-data
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        systemctl reload apache2 > /dev/null 2>&1 || true
    endscript
}
